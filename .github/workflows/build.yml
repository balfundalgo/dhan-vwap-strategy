name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # lets you trigger manually from the GitHub Actions tab

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter==5.2.2
          pip install websocket-client==1.7.0
          pip install requests==2.31.0
          pip install pandas==2.1.4
          pip install python-dotenv==1.0.1
          pip install pyotp==2.9.0
          pip install schedule==1.2.1
          pip install pyinstaller==6.3.0

      - name: Build EXE with PyInstaller spec
        run: pyinstaller DhanVWAPTrader.spec

      - name: Verify EXE was created
        run: dir dist

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: DhanVWAPTrader-Windows
          path: dist/DhanVWAPTrader.exe
          retention-days: 30
